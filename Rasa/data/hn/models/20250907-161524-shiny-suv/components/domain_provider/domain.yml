version: '3.1'
intents:
- admission_status
- certificate_request
- contact_info
- course_info
- event_info
- faculty_info
- fee_deadline
- greet
- grievance_redressal
- happy
- holiday_list
- hostel_info
- library_info
- location
- office_hours
- password_reset
- payment_methods
- result_date
- scholarship_info
- syllabus_details
- transportation
responses:
  utter_happy:
  - text: मैं आपकी मदद करके खुश हूँ।
  utter_greet:
  - text: नमस्ते! मैं आपकी कैसे मदद कर सकता हूँ?
  utter_fee_deadline:
  - text: फीस जमा करने की आखिरी तारीख 30 सितंबर 2025 है।
  utter_scholarship_info:
  - text: छात्रवृत्ति के लिए आवेदन 15 अक्टूबर तक खुला है। पात्रता वेबसाइट पर देखें।
  utter_office_hours:
  - text: हम सोमवार से शुक्रवार, सुबह 9 से शाम 5 बजे तक खुले हैं।
  utter_admission_status:
  - text: आप अपने पोर्टल में प्रवेश स्थिति देख सकते हैं।
  utter_course_info:
  - text: हम कंप्यूटर साइंस, व्यवसाय, और इंजीनियरिंग के कोर्स प्रदान करते हैं।
  utter_result_date:
  - text: परीक्षा परिणाम 10 अक्टूबर 2025 को प्रकाशित होंगे।
  utter_password_reset:
  - text: पासवर्ड रीसेट के लिए लॉगिन पेज की मदद लें।
  utter_hostel_info:
  - text: छात्रावास की सुविधा उपलब्ध है, जिसकी फीस ₹10,000 प्रति माह से शुरू होती है।
  utter_payment_methods:
  - text: आप बैंक ट्रांसफर, क्रेडिट कार्ड, या यूपीआई से भुगतान कर सकते हैं।
  utter_grievance_redressal:
  - text: कृपया हमारी वेबसाइट पर शिकायत फॉर्म भरें।
  utter_faculty_info:
  - text: शिक्षक सूची वेबसाइट पर उपलब्ध है।
  utter_syllabus_details:
  - text: सिलेबस पीडीएफ अकादमिक सेक्शन से डाउनलोड करें।
  utter_contact_info:
  - text: संपर्क करें 123-456-7890 या support@institution.edu पर।
  utter_holiday_list:
  - text: आगामी छुट्टियाँ 2 अक्टूबर और 14 नवंबर हैं।
  utter_library_info:
  - text: पुस्तकालय कार्यदिवसों में सुबह 8 से शाम 8 बजे तक खुला रहता है।
  utter_transportation:
  - text: बस सेवा शहर के मुख्य मार्गों को कवर करती है।
  utter_event_info:
  - text: वार्षिक सांस्कृतिक महोत्सव 1 दिसंबर, 2025 से शुरू होगा।
  utter_certificate_request:
  - text: प्रमाणपत्र के लिए स्टूडेंट पोर्टल पर फॉर्म भरें।
  utter_location:
  - text: कॉलेज का पता 123 एजुकेशन स्ट्रीट, सिटीनेम है।
session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
