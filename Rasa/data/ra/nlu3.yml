version: "3.1"
nlu:
- intent: greet
  examples: |
    - राम राम सा
    - के हाल है?
    - नमस्कार सा

- intent: fee_deadline
  examples: |
    - फीस जमा करणी आखरी तारीख कद है?
    - भुगतान कद तक कर सकूं?
    - फीस की अंतिम तारीख बताओ

- intent: scholarship_info
  examples: |
    - छात्रवृत्ति को नियम के है?
    - स्कॉलरशिप कद तक खुलेगी?
    - छात्रवृत्ति की जानकारी दो

- intent: office_hours
  examples: |
    - कार्यालय के काम के दिन कौन-कौन से हैं?
    - दफ्तर कब खुलता है?

- intent: admission_status
  examples: |
    - म्हारी दाखिला स्थिति के है?
    - मेरो आवेदन स्वीकारियो है के?

- intent: course_info
  examples: |
    - कोन-कोन से कोर्स उपलब्ध है?
    - कोर्स की जानकारी देओ

- intent: result_date
  examples: |
    - परीक्षा को रिजल्ट कब आवेगो?
    - अंक कब मिलसी?

- intent: password_reset
  examples: |
    - पासवर्ड केसे रीसेट करूं?
    - लॉगिन विसर गयो हूं

- intent: hostel_info
  examples: |
    - हॉस्टल उपलब्ध है के?
    - हॉस्टल री फीस के है?

- intent: payment_methods
  examples: |
    - फीस केसे भरणो है?
    - किण-किण भुगतान विकल्प है?

- intent: grievance_redressal
  examples: |
    - शिकायत केसे करूं?
    - समस्या की सूचना देवों

- intent: faculty_info
  examples: |
    - शिक्षक कौन-कौन है?
    - फैकल्टी री सूची देओ

- intent: syllabus_details
  examples: |
    - सिलेबस कहा मिलसी?
    - सिलेबस पीडीऍफ़ भेजो

- intent: contact_info
  examples: |
    - संपर्क नंबर के है?
    - हेल्पडेस्क से केसे जुड़ूं?

- intent: holiday_list
  examples: |
    - छुट्टियां कब हैं?
    - अगली छुट्टी कब है?

- intent: library_info
  examples: |
    - पुस्तकालय के समय के है?
    - पुस्तकालय सदस्यता केसे लू?

- intent: transportation
  examples: |
    - परिवहन सेवा उपलब्ध है के?
    - बस का टाइमिंग के है?

- intent: event_info
  examples: |
    - आगामी कार्यक्रम के हैं?
    - अगले कार्यक्रम बारे में बताओ

- intent: certificate_request
  examples: |
    - प्रमाणपत्र के लिए केसी अपील करूं?
    - प्रमाणपत्र कब मिलसी?

- intent: location
  examples: |
    - कॉलेज को पता के है?
    - कैंपस तक केसे पहुंचूं?