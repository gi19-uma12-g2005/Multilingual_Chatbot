version: "3.1"
nlu:
- intent: greet
  examples: |
    - नमस्कार
    - हॅलो
    - शुभ प्रभात

- intent: fee_deadline
  examples: |
    - फी जमा करण्याची अंतिम तारीख कधी आहे?
    - फी भरण्याची शेवटची तारीख सांग
    - फी कधी द्यायची आहे?

- intent: scholarship_info
  examples: |
    - शिष्यवृत्तीची माहिती द्या
    - स्कॉलरशिप मिळवण्याची अर्हता काय आहे?
    - शिष्यवृत्तीसाठी अर्ज कधी सुरू होतो?

- intent: office_hours
  examples: |
    - कार्यालयाची वेळ काय आहे?
    - कामाचे दिवस कोणते आहेत?
    - ऑफिस कधी उघडतो?

- intent: admission_status
  examples: |
    - माझा प्रवेश स्थिती काय आहे?
    - माझ्या अर्जाची स्थिती काय आहे?
    - प्रवेश मंजूर झाला का?

- intent: course_info
  examples: |
    - कोणकोणते कोर्स उपलब्ध आहेत?
    - कोर्सची माहिती सांगा
    - कोर्सेस बद्दल काही माहिती द्या

- intent: result_date
  examples: |
    - परीक्षेचा निकाल कधी येईल?
    - निकाल पाहण्याची तारीख काय आहे?
    - मार्क्स कधी मिळतील?

- intent: password_reset
  examples: |
    - पासवर्ड कसा रिसेट करावा?
    - माझा लॉगिन पासवर्ड विसरलो आहे
    - अकाउंट रीकव्हर कसा करावा?

- intent: hostel_info
  examples: |
    - हॉस्टेलची सुविधा आहे का?
    - हॉस्टेल फी किती आहे?
    - हॉस्टेलमध्ये कसा प्रवेश घ्यायचा?

- intent: payment_methods
  examples: |
    - फी भरण्याचे काय मार्ग आहेत?
    - कोणकोणते पेमेंट ऑप्शन्स आहेत?
    - ऑनलाईन पेमेंट कसे करायचे?

- intent: grievance_redressal
  examples: |
    - तक्रार कशी नोंदवायची?
    - समस्या नोंदविण्याची प्रक्रिया काय आहे?
    - फीडबॅक कुठे द्यायचा?

- intent: faculty_info
  examples: |
    - शिक्षक कोण आहेत?
    - शिक्षकांची यादी द्या
    - कोणकोणते विषय शिकवले जातात?

- intent: syllabus_details
  examples: |
    - अभ्यासक्रम कुठे उपलब्ध आहे?
    - सिलेबसची माहिती द्या
    - अभ्यासक्रमाचा पीडीएफ पाठवा

- intent: contact_info
  examples: |
    - संपर्क क्रमांक काय आहे?
    - हेल्पडेस्कशी कसे संपर्क करावा?
    - संस्था कशी संपर्क साधायची?

- intent: holiday_list
  examples: |
    - सुट्ट्या कधी आहेत?
    - सुट्ट्यांची यादी द्या
    - पुढील सुट्टी कधी आहे?

- intent: library_info
  examples: |
    - लायब्ररीची वेळ काय आहे?
    - लायब्ररी सदस्यत्व कसे घ्यायचे?
    - लायब्ररी कुठे आहे?

- intent: transportation
  examples: |
    - परिवहनाची सोय आहे का?
    - बस सुविधेची माहिती द्या
    - ट्रान्सपोर्ट सुविधा कशी आहे?

- intent: event_info
  examples: |
    - पुढील कार्यक्रम कोणते आहेत?
    - कॉलेजमध्ये कोणते कार्यक्रम होणार आहेत?
    - कार्यक्रमासाठी कसे नोंदणी करावी?

- intent: certificate_request
  examples: |
    - प्रमाणपत्र कसे मागवायचे?
    - प्रमाणपत्राची प्रक्रिया काय आहे?
    - माझं प्रमाणपत्र कधी मिळेल?

- intent: location
  examples: |
    - कॉलेजचा पत्ता काय आहे?
    - कॉलेज कसा पोहोचायचा?
    - परिसराची जागा दाखवा