responses:
  utter_greet:
    - text: "नमस्कार! मी कशी मदत करू शकतो?"
  utter_fee_deadline:
    - text: "फी जमा करण्याची शेवटची तारीख 30 सप्टेंबर 2025 आहे."
  utter_scholarship_info:
    - text: "शिष्यवृत्ती 15 ऑक्टोबरपर्यंत सुरू आहे. पात्रता वेबसाइटवर पहा."
  utter_office_hours:
    - text: "आमची ऑफिस सोमवार ते शुक्रवार, सकाळी 9 ते संध्याकाळी 5 वाजेपर्यंत उघडी आहे."
  utter_admission_status:
    - text: "तुमची प्रवेश स्थिती पोर्टलवर तपासू शकता."
  utter_course_info:
    - text: "आम्ही संगणक विज्ञान, व्यवसाय, आणि अभियांत्रिकी ह्या कोर्सेस देतो."
  utter_result_date:
    - text: "परीक्षेचे निकाल 10 ऑक्टोबर 2025 रोजी जाहीर होतील."
  utter_password_reset:
    - text: "पासवर्ड रीसेट करण्यासाठी लॉगिन पेज पाहा."
  utter_hostel_info:
    - text: "हॉस्टेल सुविधा उपलब्ध आहे, फी ₹10,000/महा पासून सुरू होते."
  utter_payment_methods:
    - text: "आपण बँक ट्रान्सफर, क्रेडिट कार्ड, किंवा यूपीआयने पेमेंट करू शकता."
  utter_grievance_redressal:
    - text: "कृपया आमच्या वेबसाइटवर तक्रार फॉर्म भरा."
  utter_faculty_info:
    - text: "फॅकल्टीची यादी वेबसाइटवर उपलब्ध आहे."
  utter_syllabus_details:
    - text: "सिलेबस पीडीएफ अॅकाडेमिक सेक्शनमधून डाउनलोड करा."
  utter_contact_info:
    - text: "आमच्याशी 123-456-7890 किंवा support@institution.edu वर संपर्क करा."
  utter_holiday_list:
    - text: "आगामी सुट्ट्या 2 ऑक्टोबर आणि 14 नोव्हेंबर आहेत."
  utter_library_info:
    - text: "लायब्ररी सकाळी 8 ते रात्री 8 या वेळेत उघडी आहे."
  utter_transportation:
    - text: "आमच्याकडे शहरातील मुख्य मार्गांसाठी बस सेवा आहे."
  utter_event_info:
    - text: "वार्षिक सांस्कृतिक समारंभ 1 डिसेंबर 2025 पासून सुरू होईल."
  utter_certificate_request:
    - text: "प्रमाणपत्रासाठी विद्यार्थी पोर्टलवर फॉर्म भरा."
  utter_location:
    - text: "आपला कॅंपस 123 एज्युकेशन स्ट्रीट, सिटीनेम येथे आहे."