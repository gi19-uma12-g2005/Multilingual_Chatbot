version: "3.1"

intents:
  - greet
  - fee_deadline
  - scholarship_info
  - office_hours
  - admission_status
  - course_info
  - result_date
  - password_reset
  - hostel_info
  - payment_methods
  - grievance_redressal
  - faculty_info
  - syllabus_details
  - contact_info
  - holiday_list
  - library_info
  - transportation
  - event_info
  - certificate_request
  - location

responses:
  utter_greet:
    - text: "নমস্কার! আমি কীভাবে সাহায্য করতে পারি?"

  utter_fee_deadline:
    - text: "ফি জমা দেওয়ার শেষ তারিখ ৩০ সেপ্টেম্বর ২০২৫।"

  utter_scholarship_info:
    - text: "স্কলারশিপ ১৫ অক্টোবর পর্যন্ত চলবে। যোগ্যতা ওয়েবসাইটে দেখুন।"

  utter_office_hours:
    - text: "আমাদের অফিস সোমবার থেকে শুক্রবার সকাল ৯টা থেকে সন্ধ্যা ৫টা পর্যন্ত খোলা থাকে।"

  utter_admission_status:
    - text: "আপনার ভর্তি স্থিতি পোর্টালে পরীক্ষা করতে পারেন।"

  utter_course_info:
    - text: "আমরা কম্পিউটার সায়েন্স, ব্যবসা, এবং ইঞ্জিনিয়ারিং কোর্স অফার করি।"

  utter_result_date:
    - text: "পরীক্ষার ফলাফল ১০ অক্টোবর ২০২৫ তারিখে ঘোষণা করা হবে।"

  utter_password_reset:
    - text: "পাসওয়ার্ড রিসেট করতে লগইন পেজ দেখুন।"

  utter_hostel_info:
    - text: "হোস্টেল সুবিধা উপলব্ধ, ফি মাসে ₹১০,০০০ থেকে শুরু।"

  utter_payment_methods:
    - text: "আপনি ব্যাংক ট্রান্সফার, ক্রেডিট কার্ড, অথবা UPI দিয়ে অর্থ প্রদান করতে পারেন।"

  utter_grievance_redressal:
    - text: "অনুগ্রহ করে আমাদের ওয়েবসাইটে অভিযোগ ফর্ম পূরণ করুন।"

  utter_faculty_info:
    - text: "ফ্যাকাল্টির তালিকা ওয়েবসাইটে পাওয়া যায়।"

  utter_syllabus_details:
    - text: "সিলেবাস পিডিএফ একাডেমিক সেকশনে ডাউনলোড করুন।"

  utter_contact_info:
    - text: "আমাদের সাথে যোগাযোগ করুন 123-456-7890 অথবা support@institution.edu এ।"

  utter_holiday_list:
    - text: "আসন্ন ছুটির দিনগুলি ২ অক্টোবর এবং ১৪ নভেম্বর।"

  utter_library_info:
    - text: "লাইব্রেরি সকাল ৮টা থেকে রাত ৮টা পর্যন্ত খোলা থাকে।"

  utter_transportation:
    - text: "আমাদের শহরের প্রধান রুটগুলির জন্য বাস সেবা রয়েছে।"

  utter_event_info:
    - text: "বার্ষিক সাংস্কৃতিক অনুষ্ঠান ১ ডিসেম্বর ২০২৫ থেকে শুরু হবে।"

  utter_certificate_request:
    - text: "সনদপত্রের জন্য শিক্ষার্থী পোর্টালে ফর্ম পূরণ করুন।"

  utter_location:
    - text: "আপনার ক্যাম্পাস ১২৩ এডুকেশন স্ট্রিট, সিটি নেম এ রয়েছে।"
