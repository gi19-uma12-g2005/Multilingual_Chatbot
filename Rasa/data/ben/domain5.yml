responses:
  utter_greet:
    - text: "नमस्कार! मी तुमची कशी मदत करू शकतो?"
  utter_fee_deadline:
    - text: "फी जमा करण्याची शेवटची तारीख ३० सप्टेंबर २०२५ आहे."
  utter_scholarship_info:
    - text: "शिष्यवृत्ती १५ ऑक्टोबरपर्यंत खुली आहे. पात्रता माहितीसाठी वेबसाईट पहा."
  utter_office_hours:
    - text: "आमची ऑफिस सोमवार ते शुक्रवार, सकाळी ९ ते संध्याकाळी ५ वाजेपर्यंत उघडी असते."
  utter_admission_status:
    - text: "तुमची प्रवेश स्थिती तुम्ही विद्यार्थी पोर्टलवर पाहू शकता."
  utter_course_info:
    - text: "आम्ही संगणक विज्ञान, व्यवसाय आणि अभियांत्रिकी कोर्सेस देतो."
  utter_result_date:
    - text: "परीक्षेचे निकाल १० ऑक्टोबर २०२५ रोजी जाहीर होतील."
  utter_password_reset:
    - text: "पासवर्ड रीसेट करण्यासाठी कृपया लॉगिन पेज वापरा."
  utter_hostel_info:
    - text: "हॉस्टेलची सोय उपलब्ध आहे, फी ₹१०,००० प्रति महिना पासून सुरु."
  utter_payment_methods:
    - text: "तुम्ही बँक ट्रान्सफर, क्रेडिट कार्ड किंवा यूपीआय वापरून फी भरू शकता."
  utter_grievance_redressal:
    - text: "कृपया आमच्या वेबसाईटवर तक्रार फॉर्म भरा."
  utter_faculty_info:
    - text: "फॅकल्टीची यादी वेबसाईटवर उपलब्ध आहे."
  utter_syllabus_details:
    - text: "सिलेबस PDF तुम्ही अकादमिक विभागातून डाउनलोड करू शकता."
  utter_contact_info:
    - text: "संपर्कासाठी १२३-४५६-७८९० किंवा support@institution.edu वर ईमेल करा."
  utter_holiday_list:
    - text: "आगामी सुट्ट्या २ ऑक्टोबर आणि १४ नोव्हेंबर रोजी आहेत."
  utter_library_info:
    - text: "लायब्ररी सकाळी ८ ते संध्याकाळी ८ वाजेपर्यंत उघडी असते."
  utter_transportation:
    - text: "शहराच्या मुख्य मार्गांसाठी बस सेवा उपलब्ध आहे."
  utter_event_info:
    - text: "वार्षिक सण १ डिसेंबर २०२५ पासून सुरू होणार आहे."
  utter_certificate_request:
    - text: "प्रमाणपत्र मागवण्यासाठी कृपया विद्यार्थी पोर्टलवर फॉर्म भरा."
  utter_location:
    - text: "कॉलेजचा पत्ता १२३ एज्युकेशन स्ट्रीट, सिटीनेम आहे."

