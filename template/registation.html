<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Admin Portal</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .form-container {
            background: #f8fafc; /* same light professional background */
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .form-link {
            color: #3b82f6;
        }
        .form-link:hover {
            color: #1e40af;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="form-container w-full max-w-md text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Password Reset</h1>
        <p class="text-gray-600 mb-6">
            If you forgot your password, please contact the technical team at 
            <a href="#"><strong>support@example.com</strong>.
            </a>
        </p>

        <a href="/" class="inline-block mt-4 py-3 px-6 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold transition duration-300">
            Back to Login
        </a>
    </div>

</body>
</html>
